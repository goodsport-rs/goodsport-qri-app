<section class="final-report-page">
  <div class="final-report-content">
    <app-admingrireport [projectDetails]="projectDetails"></app-admingrireport>
  </div>

  <section
    class="final-report-approval-panel"
    *ngIf="projectDetails?.projectStatus === 'PENDING'"
  >
    <div class="final-report-approval-panel__content">
      <h3 class="final-report-approval-panel__title">GodkûÊnnande av slutrapport</h3>
      <p class="final-report-approval-panel__subtitle">
        Granskningen ûÊr klar. GodkûÊnn slutrapporten fûÑr att slutfûÑra projektets sista steg.
      </p>
    </div>
    <div class="final-report-approval-panel__actions">
      <button
        class="btn success-button final-report-approval-panel__button"
        (click)="onClickApproveReject(approveProject)"
      >
        GodkûÊnn slutrapport
      </button>
    </div>
  </section>
</section>

<!--project approve modal-->
<ng-template #approveProject let-modal>
  <div class="modal-header px-7">
  <h4 class="modal-title fw-bolder fs-3" id="modal-basic-title">
    GodkûÊnn projekt
  </h4>
  </div>
  <div class="modal-body">
  <p>ûr du sûÊker pûË att du vill godkûÊnna projektets slutrapport?</p>
  </div>
  <div class="modal-footer justify-content-center">
    <button
      type="button"
      class="btn btn-light w-175px"
      (click)="modal.close('Save click')"
      [disabled]="statusLoading$ | async"
    >
      Avbryt
    </button>
    <button
      type="button"
      class="btn yellow-button w-175px"
      (click)="onClickPopupBtn(modal, 'approved')"
      [disabled]="statusLoading$ | async"
    >
      <ng-container *ngIf="statusLoading$ | async">
        <span class="indicator-progress" [style.display]="'block'">
          VûÊnligen vûÊnta...
          <span
            class="spinner-border spinner-border-sm align-middle ms-2"
          ></span>
        </span>
      </ng-container>
      <ng-container *ngIf="!(statusLoading$ | async)">
        <span class="indicator-label">BekrûÊfta</span>
      </ng-container>
    </button>
  </div>
</ng-template>

<!--project rework modal-->
<ng-template #reworkProject let-modal>
  <div class="modal-header px-7">
    <h4 class="modal-title fw-bolder fs-3" id="modal-basic-title">
      Rework Required
    </h4>
  </div>
  <div class="modal-body">
    <div class="fv-row fv-plugins-icon-container mb-10">
      <label class="form-label fw-medium text-gray-400 fs-6 mb-2">
        <span class="required">Comments</span>
      </label>

      <textarea
        class="form-control form-control-lg form-control-solid"
        placeholder="Comments"
        name="comments"
        [(ngModel)]="comments"
      >
      </textarea>
    </div>
  </div>
  <div class="modal-footer justify-content-center">
    <button
      type="button"
      class="btn btn-light w-175px"
      (click)="modal.close('Save click')"
      [disabled]="statusLoading$ | async"
    >
      Discard
    </button>
    <button
      type="button"
      class="btn yellow-button w-175px"
      (click)="onClickRework(modal)"
      [disabled]="statusLoading$ | async"
    >
      <ng-container *ngIf="statusLoading$ | async">
        <span class="indicator-progress" [style.display]="'block'">
          Please wait...
          <span
            class="spinner-border spinner-border-sm align-middle ms-2"
          ></span>
        </span>
      </ng-container>
      <ng-container *ngIf="!(statusLoading$ | async)">
        <span class="indicator-label">Submit</span>
      </ng-container>
    </button>
  </div>
</ng-template>
