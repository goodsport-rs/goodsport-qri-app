<!--begin::Form-->
<form class="gs-auth-form" [formGroup]="loginForm" novalidate="novalidate" id="kt_login_signin_form"
  (ngSubmit)="submit()">

  <!--begin::Heading-->
  <div class="gs-auth-head">
    <h1 class="gs-auth-title">Logga in</h1>
    <p class="gs-auth-sub mb-0">Välkommen tillbaka — logga in på ditt Goodsport-konto.</p>
  </div>
  <!--end::Heading-->

  <!-- begin::Alert error-->
  <ng-container *ngIf="hasError">
    <div class="mb-8 alert alert-danger">
      <div class="alert-text font-weight-bold">
        The login details are incorrect
      </div>
    </div>
  </ng-container>
  <!-- end::Alert error-->

  <!--begin::Email-->
  <div class="gs-field">
    <label class="gs-label">Epost</label>
    <input class="form-control" type="email" name="email" formControlName="email" autocomplete="off"
      [ngClass]="{
        'is-invalid': loginForm.controls['email'].invalid && loginForm.controls['email'].touched,
        'is-valid': loginForm.controls['email'].valid
      }" />
    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
        validation: 'required',
        message: 'Email is required',
        control: loginForm.controls['email']
      }"></ng-container>
    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
        validation: 'email',
        message: 'Email is invalid',
        control: loginForm.controls['email']
      }"></ng-container>
    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
        validation: 'minLength',
        message: 'Email should have at least 3 symbols',
        control: loginForm.controls['email']
      }"></ng-container>
    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
        validation: 'maxLength',
        message: 'Email should have maximum 360 symbols',
        control: loginForm.controls['email']
      }"></ng-container>
  </div>
  <!--end::Email-->

  <!--begin::Password-->
  <div class="gs-field">
    <div class="d-flex align-items-center justify-content-between">
      <label class="gs-label mb-0">Lösenord</label>
      <a routerLink="/auth/forgot-password" class="gs-auth-link fs-8 fw-semibold">Glömt lösenord?</a>
    </div>
    <input class="form-control mt-2" type="password" name="password" autocomplete="off"
      formControlName="password" [ngClass]="{
        'is-invalid': loginForm.controls['password'].invalid && loginForm.controls['password'].touched,
        'is-valid': loginForm.controls['password'].valid
      }" />
    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
        validation: 'required',
        message: 'Password is required',
        control: loginForm.controls['password']
      }"></ng-container>
    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
        validation: 'minlength',
        message: 'Password should have at least 3 symbols',
        control: loginForm.controls['password']
      }"></ng-container>
    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
        validation: 'maxLength',
        message: 'Password should have maximum 100 symbols',
        control: loginForm.controls['password']
      }"></ng-container>
  </div>
  <!--end::Password-->

  <!--begin::Action-->
  <div class="gs-auth-actions">
    <button type="submit" id="kt_sign_in_submit" class="btn gs-btn-primary" [disabled]="loginForm.invalid">
      <ng-container *ngIf="isLoading$ | async">
        <span class="indicator-progress" [style.display]="'block'">
          Please wait...
          <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
        </span>
      </ng-container>
      <ng-container *ngIf="(isLoading$ | async) === false">
        <span class="indicator-label">Logga in</span>
      </ng-container>
    </button>
  </div>
  <!--end::Action-->

  <div class="gs-auth-alt">
    Har du inget konto?
    <a routerLink="/auth/sign-up">Registrera ditt konto</a>
  </div>

  <!--begin::Partners-->
  <div class="partners mt-10 d-flex flex-column align-items-center">
    <p class="text-muted fs-8 fw-semibold text-uppercase mb-4" style="letter-spacing: 0.1em;">Används av</p>
    <img
      src="assets/media/logos/sbk_logotype_liggande.png"
      height="72"
      alt="Logo"
      class="partner"
      style="opacity: 0.85;"
    />
  </div>
  <!--end::Partners-->
</form>
<!--end::Form-->

<ng-template #formError let-control="control" let-message="message" let-validation="validation">
  <ng-container *ngIf="control.hasError(validation) && (control.dirty || control.touched)">
    <div class="fv-plugins-message-container">
      <span role="alert">
        {{ message }}
      </span>
    </div>
  </ng-container>
</ng-template>
