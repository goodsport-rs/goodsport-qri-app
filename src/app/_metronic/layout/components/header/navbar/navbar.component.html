

<!--begin::User menu-->
<div class="app-navbar-item" [ngClass]="itemClass">
  <div class="navbar-user d-flex align-items-center">
    <ng-container *ngIf="user$ | async as user">
      <span class="navbar-user__identity">
        <span class="symbol symbol-circle" [ngClass]="userAvatarClass">
          <span class="symbol-label bg-light-primary text-primary fw-bolder">
            {{ getInitials(user) }}
          </span>
        </span>
        <span class="navbar-user__meta ms-2">
          <span class="navbar-user__name text-gray-800 fw-bolder">
            {{ getUsername(user) }}
          </span>
          <span class="navbar-user__role text-muted fw-bold">
            {{ getRoleLabel(user) }}
          </span>
        </span>
      </span>
    </ng-container>
  </div>
</div>
<!--end::User menu-->

<!--begin::Header menu toggle-->
<ng-container *ngIf="appHeaderDefaulMenuDisplay">
  <div class="app-navbar-item d-lg-none ms-2 me-n3" title="Show header menu">
    <div class="btn btn-icon btn-active-color-primary w-35px h-35px" id="kt_app_header_menu_toggle">
      <app-keenicon name="element-4" class="fs-1" [ngClass]="btnIconClass"></app-keenicon>
    </div>
  </div>
</ng-container>
<!--end::Header menu toggle-->
